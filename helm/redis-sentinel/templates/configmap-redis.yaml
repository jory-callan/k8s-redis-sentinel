apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis-sentinel.redisName" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-sentinel.labels" . | nindent 4 }}
    app: {{ include "redis-sentinel.redisName" . }}
data:
  redis.conf: |
    port 6379
    protected-mode no
    daemonize no
    pidfile /data/redis.pid
    logfile ""
    dir /data
    slave-announce-ip __ANNOUNCE_IP__
    {{- range .Values.redis.config }}
    {{ . }}
    {{- end }}
    maxmemory {{ .Values.redis.maxmemory }}
    maxmemory-policy {{ .Values.redis.maxmemoryPolicy }}

  startup.sh: |
    #!/bin/sh
    # Redis startup — decides master/slave role
    # No 'set -e' (dash + local + $() = silent exit, see PITFALLS.md #1)

    NAMESPACE="${NAMESPACE:-redis}"
    INSTANCE_NAME="${INSTANCE_NAME:-redis}"
    ORDINAL="$(hostname | awk -F- '{print $NF}')"
    MY_IP="${POD_IP:-$(hostname -i | awk '{print $1}')}"

    # Derived names (must match services.yaml)
    REDIS_HL="${INSTANCE_NAME}-hl"
    SENTINEL_HL="${INSTANCE_NAME}-sentinel-hl"

    echo "[startup] instance=${INSTANCE_NAME} ordinal=${ORDINAL} ip=${MY_IP}"

    # ── Build redis.conf ──────────────────────────────
    cp /conf/redis.conf /data/redis.conf
    sed -i "s/__ANNOUNCE_IP__/${MY_IP}/" /data/redis.conf

    if [ -n "${REDIS_PASSWORD:-}" ]; then
      echo "requirepass ${REDIS_PASSWORD}" >> /data/redis.conf
      echo "masterauth ${REDIS_PASSWORD}"   >> /data/redis.conf
      echo "[auth] password set"
    else
      echo "[auth] no password (insecure)"
    fi

    # ── Helper: redis-cli with optional auth ──────────
    # NOTE: 'timeout' wraps redis-cli (external cmd), NOT a shell function (PITFALLS.md #12)
    # NOTE: redis-cli 5.0 has no --timeout flag (that's Redis 6+), use 'timeout' cmd
    cli() {
      if [ -n "${REDIS_PASSWORD:-}" ]; then
        timeout 2 redis-cli -a "${REDIS_PASSWORD}" "$@" 2>/dev/null
      else
        timeout 2 redis-cli "$@" 2>/dev/null
      fi
    }

    # ── Ask sentinel for master (retry 5x = ~15s) ────
    get_master_from_sentinel() {
      i=0
      while [ "$i" -lt 5 ]; do
        i=$((i + 1))
        {{- range $i := until (int .Values.sentinel.replicas) }}
        s="${INSTANCE_NAME}-sentinel-{{ $i }}"
        H="${s}.${SENTINEL_HL}.${NAMESPACE}.svc"
        IP="$(cli -h "${H}" -p 26379 SENTINEL get-master-addr-by-name mymaster 2>/dev/null | head -1)"
        if [ -n "${IP}" ] && [ "${IP}" != "nil" ]; then
          echo "${IP}"
          return 0
        fi
        {{- end }}
        sleep 3
      done
      return 1
    }

    # ── Role decision ─────────────────────────────────
    MASTER_IP="$(get_master_from_sentinel)"

    if [ -n "${MASTER_IP}" ]; then
      # Sentinel knows the master — verify it's reachable before SLAVEOF.
      # During failover, sentinel may return a stale (down) master IP.
      MASTER_REACHABLE=0
      i=0
      while [ "$i" -lt 5 ]; do
        i=$((i + 1))
        if [ "${MASTER_IP}" = "${MY_IP}" ]; then
          MASTER_REACHABLE=1
          break
        fi
        if cli -h "${MASTER_IP}" -p 6379 PING 2>/dev/null | grep -q PONG; then
          MASTER_REACHABLE=1
          break
        fi
        echo "[warn] master ${MASTER_IP} unreachable, retrying sentinel..."
        sleep 3
        NEW_IP="$(get_master_from_sentinel)"
        [ -n "${NEW_IP}" ] && MASTER_IP="${NEW_IP}"
      done

      if [ "${MASTER_REACHABLE}" = "1" ]; then
        if [ "${MASTER_IP}" = "${MY_IP}" ]; then
          echo "[role] master (sentinel confirmed)"
          exec redis-server /data/redis.conf
        else
          echo "[role] slave of ${MASTER_IP} (sentinel)"
          exec redis-server /data/redis.conf --slaveof "${MASTER_IP}" 6379
        fi
      else
        # Sentinel returned a master but it's unreachable after 5 retries.
        # This happens on full-cluster restart: sentinel has stale master IP
        # from persisted sentinel.conf, but that pod is gone.
        # Fallback to cold-start logic below (don't SLAVEOF a dead IP).
        echo "[warn] sentinel master ${MASTER_IP} unreachable after retries, fallback to cold start"
      fi
    fi

    # ── Cold start: no sentinel OR sentinel master unreachable ────
    if [ "${ORDINAL}" = "0" ]; then
      echo "[role] master (cold start, ordinal=0)"
      exec redis-server /data/redis.conf
    fi

    # ordinal > 0: wait for redis-0 (NEVER self-promote — prevents split-brain)
    REDIS_0="${INSTANCE_NAME}-0.${REDIS_HL}.${NAMESPACE}.svc"
    echo "[cold] waiting for ${REDIS_0} to become master..."
    i=0
    while [ "$i" -lt 30 ]; do
      i=$((i + 1))
      if cli -h "${REDIS_0}" -p 6379 PING 2>/dev/null | grep -q PONG; then
        echo "[role] slave of ${REDIS_0} (cold start)"
        exec redis-server /data/redis.conf --slaveof "${REDIS_0}" 6379
      fi
      sleep 2
    done

    # Cannot reach redis-0 — crash (K8s restarts). Do NOT become standalone master.
    echo "[error] cannot reach ${REDIS_0} after 60s, exiting"
    exit 1
