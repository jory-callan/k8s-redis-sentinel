# ═══════════════════════════════════════════════════════════════
# Redis-Sentinel Helm Chart — Values
#
# ⚠️  UPGRADE WARNING: Chart v1.0+ changed Service/StatefulSet
#     selector labels from `app=<instance>` to `redis-sentinel.k8s.io/*`.
#     Existing deployments MUST be deleted and reinstalled:
#       helm uninstall <release> -n <ns>
#       helm install <release> ./helm/redis-sentinel -n <ns> -f values.yaml
#     Direct helm upgrade will fail with "selector is immutable" error.
#
# 结构: common (共享) + redis (Redis pod) + sentinel (Sentinel pod)
# 每个 pod 下含: image / replicas / resources / exporter / config / probes
#
# Usage:
#   helm install my-redis ./helm/redis-sentinel -n redis --create-namespace
#   helm install log ./helm/redis-sentinel -n middleware \
#     --set common.instanceName=redis-saas-log \
#     --set common.auth.password=mypassword
# ═══════════════════════════════════════════════════════════════

# ── 共享配置 ────────────────────────────────────────────────────
common:
  # 实例名称 (业务强关联, 用于资源前缀隔离)
  # 默认使用 release name; K8s 资源名最长 63 字符, Pod 名 = instance + "-sentinel-0" (12 字符)
  # 故 instanceName 最长 42 字符
  instanceName: ""

  # 认证 (Redis + Sentinel 共用)
  auth:
    enabled: true
    # 直接指定密码 (生产环境建议用 existingSecret)
    password: "redis123"
    # 使用已存在的 Secret (优先于 password), 需包含 key: redis-password
    existingSecret: ""

  # Pod 反亲和: 让 pod 尽量分散到不同节点 (preferred, 不强制)
  podAntiAffinity: true

# ── Redis Pod 配置 ─────────────────────────────────────────────
redis:
  image:
    repository: redis
    tag: "5.0.8"
    pullPolicy: IfNotPresent

  # 副本数 (建议奇数, 1主2从最小可用)
  replicas: 3

  # 资源限制
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    # limits:
    #   cpu: 500m
    #   memory: 512Mi

  # 内存上限与淘汰策略 (生产建议显式设置, 默认 0=不限制)
  # maxmemory: "512mb"              # 例: 512mb / 1gb / 0
  # maxmemoryPolicy: "allkeys-lru"  # noeviction(默认) | allkeys-lru | volatile-lru | allkeys-lfu ...
  maxmemory: "0"
  maxmemoryPolicy: "noeviction"

  # 持久化存储
  persistence:
    enabled: true
    # 存储类 (留空使用集群默认 StorageClass)
    storageClass: ""
    size: 1Gi
    accessModes:
      - ReadWriteOnce

  # Prometheus exporter sidecar
  exporter:
    enabled: true
    image:
      repository: oliver006/redis_exporter
      tag: "v1.57.0"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 25m
        memory: 16Mi

  # role-tagger sidecar (PATCH pod label redis-role=master|slave)
  # 用 curl telnet 模式直接发 redis 协议查询角色，不依赖 exporter 容器存活
  roleTagger:
    image:
      repository: curlimages/curl
      tag: "7.88.1"
      pullPolicy: IfNotPresent
    # 轮询间隔 (s)
    intervalSeconds: 5
    # liveness: 超过此时间未更新 alive 文件则重启 sidecar (s)
    livenessTimeoutSeconds: 60
    resources:
      requests:
        cpu: 10m
        memory: 16Mi

  # 额外 redis.conf 配置 (每项 = 一行, 直接追加到 redis.conf)
  # 注: port/dir/daemonize/protected-mode/slave-announce-ip/requirepass 由模板自动生成
  config:
    - "save 900 1"
    - "save 300 10"
    - "save 60 10000"
    - "min-slaves-to-write 1"
    - "min-slaves-max-lag 10"
    - "slave-serve-stale-data yes"
    - "slave-read-only yes"
    - "slave-priority 100"
    - "timeout 0"
    - "tcp-keepalive 300"
    - "tcp-backlog 511"

  # 健康检查
  probes:
    startup:
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3

# ── Sentinel Pod 配置 ──────────────────────────────────────────
sentinel:
  image:
    repository: redis
    tag: "5.0.8"
    pullPolicy: IfNotPresent

  # 副本数 (建议奇数, quorum = ceil(replicas/2)+1)
  replicas: 3

  # quorum: 多少哨兵同意才触发 failover
  quorum: 2

  # 资源限制
  resources:
    requests:
      cpu: 10m
      memory: 32Mi

  # Prometheus exporter sidecar
  exporter:
    enabled: true
    image:
      repository: oliver006/redis_exporter
      tag: "v1.57.0"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 16Mi

  # 额外 sentinel.conf 配置 (每项 = 一行, 追加到 monitor 行之后)
  # 注: port/dir/daemonize/protected-mode/monitor/announce-ip/requirepass 由模板自动生成
  config:
    - "sentinel down-after-milliseconds mymaster 5000"
    - "sentinel failover-timeout mymaster 10000"
    - "sentinel parallel-syncs mymaster 1"

  # 健康检查
  probes:
    startup:
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 40
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3

# ── Service 配置 ──────────────────────────────────────────────
service:
  # Master / Read Service 类型 (默认 ClusterIP)
  # 可选: ClusterIP | NodePort | LoadBalancer
  type: ClusterIP
  # NodePort 配置 (type=NodePort 时生效, 需自行选择未占用端口)
  nodePort:
    master: ""    # 例: 30001
    read: ""      # 例: 30002
  # annotations: {}

# ── PodDisruptionBudget ───────────────────────────────────────
pdb:
  enabled: true
  minAvailable: 2

# ── NetworkPolicy ─────────────────────────────────────────────
# 限制 Redis/Sentinel pod 入站流量 (egress 默认放行)
# 启用后: 仅同实例 pod + redisIngressFrom 配置的业务 pod + Prometheus 可访问
networkPolicy:
  enabled: false
  # 允许访问 6379 的业务来源 (跨 namespace)
  # 空数组 = 只允许同 namespace 内同实例 pod
  # 每项: { namespace: <ns>, podSelector: {<label>: <value>} }
  # podSelector 可省略 (留空 = 整个 namespace 的 pod)
  redisIngressFrom: []
  # 例:
  # - namespace: app
  #   podSelector:
  #     app: web
  # - namespace: middleware
  # Prometheus 所在 namespace (用于抓取 9121 metrics)
  # 留空 = 不允许跨 namespace 抓取 (仅同 namespace)
  prometheusNamespace: "monitoring"

# ── Prometheus 监控 (ServiceMonitor + PrometheusRule) ────────
# 需要 Prometheus Operator (CRD: monitoring.coreos.com/v1)
monitoring:
  enabled: false
  # ServiceMonitor 抓取间隔
  interval: 15s
  # PrometheusRule 告警规则 (启用时自动创建关键告警)
  alerts:
    enabled: true
    # 告警发送到的 namespace (PrometheusRule 资源所在 ns)
    namespace: ""

# ── 备份 (CronJob → 对象存储) ─────────────────────────────────
# 定时从 master 拉取 RDB 快照上传到对象存储
# 原理: redis-cli --rdb 通过复制协议拉 RDB (触发 master fork, 不挂 PVC)
# 上传工具: rclone (支持 S3/MinIO/阿里云OSS/腾讯云COS/Azure/GCS 等 40+ 后端,
#           不绑定特定厂商, 配置改 endpoint+provider 即可切换)
backup:
  enabled: false
  # 上传镜像 (rclone, 覆盖 40+ 对象存储后端)
  image:
    repository: rclone/rclone
    tag: "1.66.0"
    pullPolicy: IfNotPresent
  # RDB 拉取镜像 (需含 redis-cli)
  dumperImage:
    repository: redis
    tag: "5.0.8"
    pullPolicy: IfNotPresent
  # Cron 调度 (默认每天 02:00)
  schedule: "0 2 * * *"
  # 并发控制: 上一次未完成则跳过
  concurrencyPolicy: Forbid
  # 保留历史 Job 数
  historyLimit: 3
  # 对象存储配置 (rclone S3 backend)
  # endpoint: 集群内 MinIO / 云厂商 S3 兼容端点
  endpoint: "http://minio.minio.svc.cluster.local:80"
  # provider: rclone S3 backend 类型, 决定厂商特定行为
  #   Minio / AWS / Alibaba / Tencent / Ceph / Other (空=自动)
  # 切换存储只改 endpoint+provider, 不改脚本
  provider: "Minio"
  # 外部 https 端点用自签名证书时设 true (跳过证书校验, 集群内 http 无需)
  insecure: false
  bucket: "redis-test"
  # 备份在 bucket 下的子路径前缀 (默认用 instanceName 自动隔离多实例)
  prefix: ""
  region: "us-east-1"
  # 凭证 (生产建议用 existingSecret)
  accessKey: "minioadmin"
  secretKey: "minioadmin"
  # 使用已存在的 Secret (优先于 accessKey/secretKey)
  # 需含 key: access-key, secret-key
  existingSecret: ""
  # 保留天数 (超过自动删除)
  retentionDays: 7
  # 资源
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
