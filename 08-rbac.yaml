# ──────────────────────────────────────────────────────────────
# RBAC for role-tagger sidecar
# Allows sidecar to patch redis-role label on its own pod
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-role-tagger
  namespace: redis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-role-tagger
  namespace: redis
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-role-tagger
  namespace: redis
subjects:
  - kind: ServiceAccount
    name: redis-role-tagger
    namespace: redis
roleRef:
  kind: Role
  name: redis-role-tagger
  apiGroup: rbac.authorization.k8s.io
