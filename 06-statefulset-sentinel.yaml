apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: __INSTANCE_NAME__-sentinel
  namespace: __NAMESPACE__
spec:
  serviceName: __INSTANCE_NAME__-sentinel-hl
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: __INSTANCE_NAME__-sentinel
  template:
    metadata:
      labels:
        app: __INSTANCE_NAME__-sentinel
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: __INSTANCE_NAME__-sentinel
                topologyKey: kubernetes.io/hostname
      containers:
        # ── Redis Sentinel 5.0.8 ────────────────────────
        - name: sentinel
          image: redis:5.0.8
          command:
            - sh
            - /conf/entrypoint.sh
          ports:
            - name: sentinel
              containerPort: 26379
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INSTANCE_NAME
              value: __INSTANCE_NAME__
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: __INSTANCE_NAME__-secret
                  key: redis-password
                  optional: true
          # startupProbe: sentinel discovery can take up to 200s
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then redis-cli -a "$P" -p 26379 PING 2>/dev/null; else redis-cli -p 26379 PING 2>/dev/null; fi | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 40
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then M=$(redis-cli -a "$P" -p 26379 SENTINEL get-master-addr-by-name mymaster 2>/dev/null); else M=$(redis-cli -p 26379 SENTINEL get-master-addr-by-name mymaster 2>/dev/null); fi
                  echo "$M" | head -1 | grep -qv "^nil$" && [ -n "$M" ]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then redis-cli -a "$P" -p 26379 PING 2>/dev/null; else redis-cli -p 26379 PING 2>/dev/null; fi | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: conf
              mountPath: /conf
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi

        # ── Sentinel Exporter (Prometheus sidecar) ──────
        - name: exporter
          image: oliver006/redis_exporter:v1.57.0
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: redis://127.0.0.1:26379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: __INSTANCE_NAME__-secret
                  key: redis-password
                  optional: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi

      volumes:
        - name: conf
          configMap:
            name: __INSTANCE_NAME__-sentinel-config
            defaultMode: 0755
        - name: data
          emptyDir: {}
