apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: redis
spec:
  serviceName: redis-hl
  replicas: 3
  # Parallel: all pods start simultaneously
  # Split-brain prevention is in startup.sh (ordinal>0 never self-promotes)
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: redis
                topologyKey: kubernetes.io/hostname
      containers:
        # ── Redis 5.0.8 ──────────────────────────────────
        - name: redis
          image: redis:5.0.8
          command:
            - sh
            - /conf/startup.sh
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
                  optional: true
          # startupProbe: generous timeout for cold start (150s)
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then redis-cli -a "$P" PING 2>/dev/null; else redis-cli PING 2>/dev/null; fi | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          # readinessProbe: only master passes → redis-master.svc routes to master only
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then redis-cli -a "$P" ROLE 2>/dev/null; else redis-cli ROLE 2>/dev/null; fi | head -1 | grep -q master
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then redis-cli -a "$P" PING 2>/dev/null; else redis-cli PING 2>/dev/null; fi | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: conf
              mountPath: /conf
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi

        # ── Redis Exporter (Prometheus sidecar) ──────────
        - name: exporter
          image: oliver006/redis_exporter:v1.57.0
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: redis://127.0.0.1:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
                  optional: true
          resources:
            requests:
              cpu: 25m
              memory: 16Mi

      volumes:
        - name: conf
          configMap:
            name: redis-config
            defaultMode: 0755

  # ── PVC: persistent storage (production) ──────────────
  # Requires a default StorageClass in the cluster
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
