apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: redis
spec:
  serviceName: redis-hl
  replicas: 3
  # Parallel: all pods start simultaneously
  # Split-brain prevention is in startup.sh (ordinal>0 never self-promotes)
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        # Initial label; role-tagger sidecar updates it every 5s based on ROLE.
        redis-role: slave
    spec:
      serviceAccountName: redis-role-tagger
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: redis
                topologyKey: kubernetes.io/hostname
      containers:
        # ── Redis 5.0.8 ──────────────────────────────────
        - name: redis
          image: redis:5.0.8
          command:
            - sh
            - /conf/startup.sh
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
                  optional: true
          # startupProbe: generous timeout for cold start (150s)
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then redis-cli -a "$P" PING 2>/dev/null; else redis-cli PING 2>/dev/null; fi | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          # readinessProbe: PING (health check only).
          # Master routing is handled by redis-role label (set by role-tagger sidecar)
          # and redis-master.svc selector redis-role=master.
          # This avoids storm of probe-failure events on slaves.
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then redis-cli -a "$P" PING 2>/dev/null; else redis-cli PING 2>/dev/null; fi | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  P="${REDIS_PASSWORD:-}"
                  if [ -n "$P" ]; then redis-cli -a "$P" PING 2>/dev/null; else redis-cli PING 2>/dev/null; fi | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: conf
              mountPath: /conf
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi

        # ── Redis Exporter (Prometheus sidecar) ──────────
        - name: exporter
          image: oliver006/redis_exporter:v1.57.0
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: redis://127.0.0.1:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
                  optional: true
          resources:
            requests:
              cpu: 25m
              memory: 16Mi

        # ── role-tagger sidecar ───────────────────────────
        # Polls redis_exporter metrics every 5s for role, patches pod label
        # redis-role=master|slave. redis-master.svc selector uses redis-role=master
        # → routes only to master. Replaces readinessProbe=ROLE=master (which
        # caused storm of failure events on slaves).
        # Uses curlimages/curl (lightweight, ~4MB) — no kubectl/redis-cli needed.
        - name: role-tagger
          image: curlimages/curl:7.88.1
          command:
            - sh
            - -c
            - |
              set -u
              TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              NS="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              APISERVER="https://kubernetes.default.svc"
              while true; do
                ROLE="$(curl -s --max-time 3 http://127.0.0.1:9121/metrics 2>/dev/null \
                        | grep '^redis_instance_info' \
                        | sed -n 's/.*role="\([a-z]*\)".*/\1/p' | head -1)"
                if [ "$ROLE" = "master" ] || [ "$ROLE" = "slave" ]; then
                  curl -s --cacert "$CACERT" -X PATCH \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/merge-patch+json" \
                    --data "{\"metadata\":{\"labels\":{\"redis-role\":\"$ROLE\"}}}" \
                    "$APISERVER/api/v1/namespaces/$NS/pods/$POD_NAME" >/dev/null 2>&1
                fi
                sleep 5
              done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 10m
              memory: 16Mi

      volumes:
        - name: conf
          configMap:
            name: redis-config
            defaultMode: 0755

  # ── PVC: persistent storage (production) ──────────────
  # Requires a default StorageClass in the cluster
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
