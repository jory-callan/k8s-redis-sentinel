# ──────────────────────────────────────────────────────────────
# PodDisruptionBudgets — ensure quorum during voluntary disruptions
# ──────────────────────────────────────────────────────────────
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: __INSTANCE_NAME__-pdb
  namespace: __NAMESPACE__
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: __INSTANCE_NAME__
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: __INSTANCE_NAME__-sentinel-pdb
  namespace: __NAMESPACE__
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: __INSTANCE_NAME__-sentinel
